name: CD Pipeline
# CD: Build, Test, Release, Deploy on push to main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Build
        run: go build ./...
        working-directory: backend

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v3
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      - name: Test
        run: go test ./...
        working-directory: backend

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create Release Tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          TAG="v1.0.$(date +%s)"
          git tag $TAG
          git push origin $TAG

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Simulate Deploy
        run: |
          echo "Deploying to server..."
          echo "Running: docker compose up --build -d"
          echo "Deploy completed successfully!"
